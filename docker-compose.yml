networks:
  llama-net:

services:
  llm-model-manager:
    build:
      context: .
      dockerfile: Dockerfile
    image: local/llm-model-manager:latest
    container_name: llm-model-manager
    restart: unless-stopped
    environment:
      - HF_TOKEN=${HF_TOKEN}
      # - LOG_LEVEL=DEBUG # Uncomment for verbose logging
    ports:
      - "8000:8000"
    volumes:
      - ${MODELS}:/models
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    labels:
      - "com.centurylinklabs.watchtower.enable=false"

  llama-swap:
    build:
      context: .
      dockerfile: Dockerfile.llama.cuda
    image: local/llama-swap:cuda
    container_name: llama-swap
    restart: unless-stopped
    ports:
      - 8080:8080
    networks:
      - llama-net
    volumes:
      - ${MODELS}:/models
    command: --config /models/served/config.yaml
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]