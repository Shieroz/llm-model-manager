<!DOCTYPE html>
<html lang="en" class="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LLM Config Manager</title>
    <link href="/static/output.css" rel="stylesheet">
    <link rel="icon" type="image/x-icon" href="/favicon.ico">
    <div class="logo-container">
        <div class="logo-icon">M</div>
        <div class="logo-text">LLM Model Manager</div>
    </div>
    <style>
        /* Custom scrollbar for dark mode */
        .custom-scrollbar::-webkit-scrollbar { width: 8px; }
        .custom-scrollbar::-webkit-scrollbar-track { background: #1f2937; border-radius: 4px; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: #4b5563; border-radius: 4px; }
        .custom-scrollbar::-webkit-scrollbar-thumb:hover { background: #6b7280; }
        
        .logo-container { display: flex; align-items: center; font-family: Arial, sans-serif; color: white; margin-bottom: 1rem; }
        .logo-icon { width: 40px; height: 40px; background-color: #3b82f6; border-radius: 50%; display: flex; justify-content: center; align-items: center; font-size: 20px; font-weight: bold; margin-right: 10px; color: white; }
        .logo-text { font-size: 1.25rem; font-weight: bold; }

        /* Hardcoded Hover Effects */
        .config-card { transition: all 0.2s ease-in-out; }
        .storage-repo-card { transition: border-color 0.2s ease, box-shadow 0.2s ease; }
        .storage-repo-card:hover { border-color: #a855f7; box-shadow: 0 10px 15px -3px rgba(0,0,0,0.5); }
        .storage-file-row { transition: background-color 0.2s ease, border-color 0.2s ease; }
        .storage-file-row:hover { background-color: #374151; border-color: #9ca3af; }
        .storage-file-row:hover .file-expand-icon { color: #ffffff; }
        .toggle-checkbox:checked + .toggle-label { background-color: #a855f7; }
        .toggle-checkbox:checked + .toggle-label::after { transform: translateX(100%); }
        .toggle-label {
            width: 2rem; height: 1rem; background-color: #4b5563; border-radius: 9999px;
            position: relative; cursor: pointer; transition: background-color 0.2s; display: inline-block;
        }
        .toggle-label::after {
            content: ''; position: absolute; top: 2px; left: 2px;
            width: 0.75rem; height: 0.75rem; background-color: white; border-radius: 50%;
            transition: transform 0.2s;
        }
    </style>
</head>
<body class="bg-gray-900 text-gray-100 p-8 font-sans">
    <div class="max-w-7xl mx-auto grid grid-cols-1 md:grid-cols-12 gap-8 h-[calc(100vh-4rem)]">
        
        <div class="md:col-span-5 flex flex-col gap-6 h-full">
            
            <div class="bg-gray-800 p-6 rounded-lg shadow-lg border border-gray-700 shrink-0">
                <h2 id="formTitle" class="text-2xl font-bold mb-4 text-blue-400">Deploy New Config</h2>
                <form id="setupForm" class="space-y-4">
                    <input type="hidden" id="original_name" value="">
                    <div>
                        <label class="block text-sm text-gray-400">HF Repo *</label>
                        <input type="text" id="hf_repo" placeholder="unsloth/Qwen3.5-0.8B-GGUF" required class="mt-1 w-full bg-gray-700 border-gray-600 rounded p-2 text-white focus:ring-blue-500">
                    </div>
                    <div>
                        <label class="block text-sm text-gray-400">Branch</label>
                        <select id="branch_select" disabled class="mt-1 w-full bg-gray-700 border-gray-600 rounded p-2 text-white focus:ring-blue-500 disabled:opacity-50">
                            <option value="">Enter a repo first</option>
                        </select>
                    </div>
                    <div>
                        <label class="block text-sm text-gray-400">Commit (Revision)</label>
                        <div class="flex gap-2 mt-1">
                            <select id="commit_select" disabled class="flex-1 bg-gray-700 border-gray-600 rounded p-2 text-white focus:ring-blue-500 disabled:opacity-50">
                                <option value="">Enter a repo first</option>
                            </select>
                            <input type="text" id="commit_sha" disabled placeholder="or enter SHA..." class="flex-1 bg-gray-700 border-gray-600 rounded p-2 text-white font-mono text-xs focus:ring-blue-500 disabled:opacity-50">
                        </div>
                        <div id="commit_info" class="text-xs text-gray-500 mt-1 hidden"></div>
                    </div>
                    <div>
                        <label class="block text-sm text-gray-400">Quantization *</label>
                        <select id="quant" disabled required class="mt-1 w-full bg-gray-700 border-gray-600 rounded p-2 text-white focus:ring-blue-500 disabled:opacity-50">
                            <option value="">Enter a repo first</option>
                        </select>
                    </div>
                    <div id="mmproj_container" class="hidden">
                        <label class="block text-sm text-gray-400">Vision Projector (mmproj)</label>
                        <select id="mmproj" disabled class="mt-1 w-full bg-gray-700 border-gray-600 rounded p-2 text-white focus:ring-blue-500 disabled:opacity-50">
                            <option value="">None</option>
                        </select>
                    </div>
                    <div>
                        <label class="block text-sm text-gray-400">Symlink Name *</label>
                        <input type="text" id="symlink_name" disabled required class="mt-1 w-full bg-gray-700 border-gray-600 rounded p-2 text-white focus:ring-blue-500 disabled:opacity-50">
                    </div>
                    <div>
                        <label class="block text-sm text-gray-400">Parameters (JSON) *</label>
                        <textarea id="parameters" required rows="7" class="mt-1 w-full bg-gray-700 border-gray-600 rounded p-2 text-white font-mono text-sm"></textarea>
                    </div>
                    <div class="flex gap-2">
                        <button type="submit" id="submitBtn" class="flex-1 bg-blue-600 hover:bg-blue-700 text-white font-bold py-2 px-4 rounded transition shadow">Provision Model</button>
                        <button type="button" id="clearBtn" onclick="resetForm()" class="bg-gray-600 hover:bg-gray-500 text-white py-2 px-4 rounded transition shadow">Clear</button>
                    </div>
                    <p id="statusMsg" class="text-sm mt-2 hidden"></p>
                </form>
            </div>

            <div class="bg-gray-800 p-6 rounded-lg shadow-lg border border-gray-700 flex-1 flex flex-col min-h-0">
                <div class="flex flex-col xl:flex-row xl:justify-between xl:items-end mb-4 gap-4 border-b border-gray-700 pb-4 shrink-0">
                    <h2 class="text-xl font-bold text-purple-400">Disk Storage</h2>
                    <div class="flex items-center gap-2 w-full xl:w-auto">
                        <input type="text" id="storageSearch" oninput="filterStorage()" placeholder="Search files..." class="w-full bg-gray-900 border border-gray-600 rounded p-1.5 text-sm text-white focus:ring-purple-500 placeholder-gray-500">
                    </div>
                </div>
                <div id="storageList" class="flex-1 overflow-y-auto pr-2 custom-scrollbar space-y-4"></div>
            </div>

        </div>

        <div class="md:col-span-7 flex flex-col h-full">
            <div class="flex flex-col sm:flex-row sm:justify-between sm:items-end mb-4 gap-4 shrink-0">
                <div class="flex items-center gap-4">
                    <h2 class="text-2xl font-bold text-green-400">Active Configurations</h2>
                    <div class="flex items-center gap-2 bg-gray-800 p-1.5 px-3 rounded border border-gray-700 shadow-sm">
                        <span class="text-xs font-bold text-gray-300 tracking-wider uppercase">RPC Mode</span>
                        <div class="flex items-center mt-1">
                            <input type="checkbox" id="rpcToggle" class="hidden toggle-checkbox" onchange="toggleRPCMode()">
                            <label for="rpcToggle" class="toggle-label"></label>
                        </div>
                        </div>
                </div>
                <div class="flex items-center gap-4 w-full sm:w-auto">
                    <input type="text" id="configSearch" oninput="filterConfigs()" placeholder="Search configs..." class="w-full sm:w-64 bg-gray-900 border border-gray-700 rounded p-1.5 text-sm text-white focus:ring-blue-500 placeholder-gray-500">
                    <span id="wsStatus" class="text-xs text-gray-500 flex items-center gap-1 whitespace-nowrap"><span class="w-2 h-2 rounded-full bg-yellow-500"></span> Connecting...</span>
                </div>
            </div>
            
            <div id="configList" class="space-y-4 overflow-y-auto pr-2 pb-4 custom-scrollbar flex-1"></div>
        </div>
        
    </div>

    <script src="/js/state.js?v=2"></script>
    <script src="/js/utils.js?v=2"></script>
    <script src="/js/api.js?v=2"></script>
    <script src="/js/filter.js?v=2"></script>
    <script src="/js/localmodels.js?v=2"></script>
    <script src="/js/render.js?v=2"></script>
    <script src="/js/ws.js?v=2"></script>
    <script src="/js/form.js?v=2"></script>
    <script src="/js/app.js?v=2"></script>
    <script>
        App.init();
        Ws.connect();
        LocalModels.fetch();
    </script>
</body>
</html>
